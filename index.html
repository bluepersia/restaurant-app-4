<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Jimmy's Diner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Karla:wght@800&family=Smythe&display=swap"
      rel="stylesheet"
    />

    <!-- Global CSS-->
    <link rel="stylesheet" href="./src/css/tokens.css" />
    <link rel="stylesheet" href="./src/css/index.css" />
    <link rel="stylesheet" href="./src/css/utilities.css" />

    <!-- Blocks-->
    <link rel="stylesheet" href="./src/css/blocks/header/header.css" />
    <link rel="stylesheet" href="./src/css/blocks/menu/menu.css" />
    <link rel="stylesheet" href="./src/css/blocks/menu-item/menu-item.css" />
  </head>

  <body>
    <header class="header">
      <div class="header__inner container">
        <h1 class="header__title">Jimmy's Diner</h1>
        <p class="header__sub-title">The best burgers and pizzas in town.</p>
        <img
          class="header__img"
          src="./img/burger.jpg"
          alt="Beef burger with lettuce, onions, egg and cheese"
        />
      </div>
    </header>

    <main>
      <section class="menu">
        <div class="menu__inner container">
          <h2 class="sr-only">Menu</h2>
          <ul class="menu__list reset-list" id="menu-list"></ul>
        </div>
      </section>

      <section class="order">
        <div class="order__inner container">
          <h2 class="order__title">Your order</h2>

          <div class="order__summary">
            <ul class="order__summary-list reset-list">
              <li class="order-item">
                <h3 class="order-item__title">Pizza</h3>
                <button class="order-item__remove-btn">remove</button>
                <p class="order-item__price">$14</p>
              </li>
              <li class="order-item">
                <h3 class="order-item__title">Beer</h3>
                <button class="order-item__remove-btn">remove</button>
                <p class="order-item__price">$12</p>
              </li>
            </ul>
            <div class="order-item">
              <h3 class="order-item__title">Total price:</h3>
              <p class="order-item__price">$26</p>
            </div>
          </div>

          <button class="btn" data-complete>Complete order</button>
        </div>
      </section>
    </main>

    <script src="./src/js/index.js" type="module"></script>
  </body>
</html>
